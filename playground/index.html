<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>stream-ui playground</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header>
      <div class="header-row">
        <div>
          <h1>stream-ui</h1>
          <p>Human → Agent → Streamed UI. Try: <code>make a button</code>, <code>build a form</code>, <code>show a list</code>, <code>card</code>.</p>
        </div>
        <div id="theme-switcher" class="theme-switcher" role="group" aria-label="Theme">
          <button type="button" data-theme="system" aria-pressed="true">System</button>
          <button type="button" data-theme="light" aria-pressed="false">Light</button>
          <button type="button" data-theme="dark" aria-pressed="false">Dark</button>
          <button type="button" data-theme="heritage" aria-pressed="false">Heritage</button>
        </div>
      </div>
    </header>

    <div class="grid" id="grid">
      <section class="region region-chat">
        <div class="panel-header">
          <h2>CHAT</h2>
          <button type="button" id="chat-clear" class="panel-header-btn">Clear</button>
        </div>
        <div id="chat-log" class="scroll" aria-live="polite"></div>
        <div id="chat-suggestions" class="chat-suggestions" aria-label="Prompt suggestions"></div>
        <form id="chat-form" class="chat-input">
          <input id="chat-input" type="text" placeholder="Ask the agent…" autocomplete="off" autofocus />
          <button type="submit">Send</button>
        </form>
      </section>

      <div class="resizer resizer-v" data-resize-axis="col" role="separator" aria-orientation="vertical" aria-label="Resize chat and AI panels"></div>

      <section class="region region-ai">
        <h2>AI</h2>
        <div id="ai-stream" class="scroll" aria-live="polite"></div>
      </section>

      <div class="resizer resizer-h" data-resize-axis="row" role="separator" aria-orientation="horizontal" aria-label="Resize top row and UI panel"></div>

      <section class="region region-ui">
        <h2>UI</h2>
        <div id="ui-stage" class="scroll"></div>
      </section>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
